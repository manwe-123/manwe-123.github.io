<!-- Site Header -->
<header class="site-header">
  <div class="container">
    <div class="nav-container">
      <!-- Logo / Site Title -->
      <a href="{{ '/' | relative_url }}" class="nav-logo">
        {% if site.logo_text %}
          {{ site.logo_text }}
        {% else %}
          {{ site.title }}
        {% endif %}
      </a>
      
      <!-- Mobile Menu Toggle -->
      <button class="nav-toggle" aria-label="Toggle menu" id="navToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      
      <!-- Navigation -->
      <nav class="nav-menu" aria-label="Main navigation" id="navMenu">
        <a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">Home</a>
        <a href="{{ '/projects' | relative_url }}" class="nav-link{% if page.url contains '/projects' %} active{% endif %}">Projects</a>
        <a href="{{ '/about' | relative_url }}" class="nav-link{% if page.url contains '/about' %} active{% endif %}">About</a>
        <a href="{{ '/contact' | relative_url }}" class="nav-link{% if page.url contains '/contact' %} active{% endif %}">Contact</a>
      </nav>
    </div>
  </div>
</header>
