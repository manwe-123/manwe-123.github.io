<!-- Lightbox Modal for Image Gallery -->
<div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <div class="lightbox-content">
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close image viewer">&times;</button>
    <img id="lightbox-img" class="lightbox-image" src="" alt="">
    <p id="lightbox-caption" class="lightbox-caption"></p>
  </div>
</div>
