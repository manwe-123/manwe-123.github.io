# Mechanical Engineering Portfolio Configuration

title: "Mechanical Engineering Portfolio"
description: "CAD, Robotics & Prototyping Portfolio"
baseurl: "" 
url: "" 

# Theme settings - we're using custom CSS
theme: null

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /projects/:title/

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules

lsi: false
safe: true
incremental: false
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
